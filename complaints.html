<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HostCare Complaints</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#ffe6f0;font-family:Segoe UI, sans-serif;position:relative;}
body::before{content:"";position:absolute;width:600px;height:600px;background:radial-gradient(circle,#ffb6c1,#ff69b4,#ff1493);filter:blur(100px);border-radius:50%;animation:move1 12s infinite alternate;opacity:0.8;top:-100px;left:-150px;}
body::after{content:"";position:absolute;width:400px;height:400px;background:radial-gradient(circle,#ffc0cb,#ff69b4,#ff1493);filter:blur(80px);border-radius:50%;animation:move2 8s infinite alternate-reverse;opacity:0.7;bottom:-100px;right:-100px;}
@keyframes move1{from{transform:translate(-200px,-200px);}to{transform:translate(200px,200px);} }
@keyframes move2{from{transform:translate(150px,150px);}to{transform:translate(-150px,-150px);} }

.navbar{background:rgba(255,192,203,0.9);backdrop-filter:blur(5px);}
.table-hover tbody tr:hover{background:rgba(255,105,180,0.2);}
.badge-pending{background:#ffc107;color:#000;}
.badge-progress{background:#0dcaf0;color:#000;}
.badge-resolved{background:#198754;color:#fff;}
.sticky-bar{position:sticky;top:0;z-index:99;background:rgba(255,192,203,0.9);backdrop-filter:blur(5px);padding:10px;border-radius:10px;margin-bottom:10px;}
.kpi-card{background:linear-gradient(135deg,#ffeb3b,#ffc107);border-radius:15px;text-align:center;padding:20px;box-shadow:0 5px 15px rgba(0,0,0,0.2);transition:0.3s;height:150px;display:flex;flex-direction:column;justify-content:center;align-items:center;margin-bottom:15px;}
.kpi-card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 10px 25px rgba(0,0,0,0.3);}
.kpi-card h3{font-size:18px;color:#004d40;}
.kpi-card h1{font-size:32px;color:#004d40;}
.btn-back{background:#ff69b4;color:white;font-weight:bold;border-radius:8px;padding:10px 20px;border:none;transition:0.3s;margin-bottom:10px;}
.btn-back:hover{background:#ff1493;color:white;transform:scale(1.05);}
.btn-gradient{
  background: linear-gradient(90deg, #ff69b4, #ff1493);
  color: #fff;
  font-weight: bold;
  border-radius: 8px;
  padding: 8px 15px;
  border: none;
  transition: 0.3s;
}
.btn-gradient:hover{
  transform: scale(1.05);
  box-shadow: 0 0 10px #ff1493;
}
.footer-box{
  background: rgba(255,192,203,0.9);
  border-radius: 10px;
  padding: 10px 15px;
  text-align: center;
  margin: 30px 10px 20px 10px;
  font-size: 12px;
  color: #004d40;
  backdrop-filter: blur(5px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-4 sticky-top">
  <a class="navbar-brand fw-bold" href="dashboard.html">
    <img src="./logo.jpg" alt="HostCare Logo" style="height:40px;margin-right:10px;"> HostCare
  </a>
  <div class="ms-auto d-flex gap-2 align-items-center">
    <button class="btn-gradient" onclick="browseAnything()">🔍 Search</button>
    <button class="btn-gradient" data-bs-toggle="modal" data-bs-target="#notifModal">🔔 Notification</button>
    <div class="dropdown">
      <button class="btn-gradient dropdown-toggle" type="button" data-bs-toggle="dropdown">Menu</button>
      <ul class="dropdown-menu dropdown-menu-end">
         <li><a class="dropdown-item" href="dashboard.html">Dashboard</a></li>
        <li><a class="dropdown-item" href="complaints.html">Complaints</a></li>
        <li><a class="dropdown-item" href="students.html">Students</a></li>
        <li><a class="dropdown-item" href="profile.html">Profile</a></li>
        <li><a class="dropdown-item" href="about.html">About</a></li>
      </ul>
    </div>
    <button class="btn-gradient" onclick="exportCSV()">💾 Export CSV</button>
    <button class="btn-gradient" onclick="location.href='index.html'">⏏️ Logout</button>
  </div>
</nav>

<div class="container mt-4">
  <button class="btn-back" onclick="location.href='dashboard.html'">⬅ Back to Dashboard</button>
  <!-- ADD NEW BUTTON HERE -->
  <button class="btn-back ms-2" onclick="openAddComplaintModal()">➕ Add Complaint</button>

  <div class="row">
    <div class="col-md-3"><div class="kpi-card"><h3>Total Complaints</h3><h1 id="totalComplaints">0</h1></div></div>
    <div class="col-md-3"><div class="kpi-card"><h3>Resolved ✅</h3><h1 id="resolved">0</h1></div></div>
    <div class="col-md-3"><div class="kpi-card"><h3>Pending ⏳</h3><h1 id="pending">0</h1></div></div>
    <div class="col-md-3"><div class="kpi-card"><h3>In Progress ⏳</h3><h1 id="inProgress">0</h1></div></div>
  </div>

  <div class="sticky-bar d-flex gap-2 flex-wrap mt-3 mb-2">
    <input type="text" id="searchInput" class="form-control" placeholder="Search by student, category or room..." onkeyup="filterTable()" style="max-width:300px;">
    <select id="statusFilter" class="form-select" onchange="filterTable()" style="max-width:200px;">
      <option value="">All Status</option>
      <option value="Pending ⏳">Pending ⏳</option>
      <option value="In Progress ⏳">In Progress ⏳</option>
      <option value="Resolved ✅">Resolved ✅</option>
    </select>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-bordered" id="complaintsTable">
      <thead class="table-light">
        <tr>
          <th>ID ⬍</th>
          <th>Student ⬍</th>
          <th>Room</th>
          <th>Block</th>
          <th>Category</th>
          <th>Issue</th>
          <th>Status ⬍</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="addComplaintModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Add New Complaint</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label>Student Name:</label>
        <input type="text" id="newName" class="form-control mb-2" placeholder="Enter student name">
        <label>Room:</label>
        <input type="text" id="newRoom" class="form-control mb-2" placeholder="Enter room number">
        <label>Block:</label>
        <select id="newBlock" class="form-select mb-2">
          <option value="Nova">Nova</option>
          <option value="Aurora">Aurora</option>
          <option value="Lumina">Lumina</option>
          <option value="Serene">Serene</option>
          <option value="Ibis">Ibis</option>
        </select>
        <label>Category:</label>
        <select id="newCategory" class="form-select">
          <option value="Room 🛏️">Room 🛏️</option>
          <option value="Toilet 🚽">Toilet 🚽</option>
          <option value="Wifi 🌐">Wifi 🌐</option>
          <option value="Electrical ⚡">Electrical ⚡</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn-gradient" onclick="submitAddComplaint()">Submit</button>
      </div>
    </div>
  </div>
</div>

<div class="footer-box">© 2026 HostCare System — Developed by Hanees</div>

<script>
// KPI count-up
function countUp(id,target){let el=document.getElementById(id),c=0,step=target/50;let interval=setInterval(()=>{c+=step;if(c>=target){c=target;clearInterval(interval);}el.innerText=Math.floor(c);},20);}
countUp('totalComplaints',120);countUp('resolved',80);countUp('pending',30);countUp('inProgress',10);

// Generate 120 complaints
const students = ["Alya","Sara","Amira","Lina","Farah","Hana","Rania","Amal","Zara","Maya","Aisha","Noor","Yasmin","Lea","Huda","Salma","Nadia","Reina","Mira","Fatin","Sabrina","Laila","Dana","Rana","Alia","Nura","Izza","Shahira","Tania","Hanae"];
const blocks = ["Nova","Aurora","Lumina","Serene","Ibis"];
const categories = ["Room 🛏️","Toilet 🚽","Wifi 🌐","Electrical ⚡"];
const tableBody = document.querySelector("#complaintsTable tbody");

for(let i=0;i<120;i++){
    let student = students[i%students.length];
    let block = blocks[i%blocks.length];
    let category = categories[i%categories.length];
    let status = i<80?"Resolved ✅":(i<110?"Pending ⏳":"In Progress ⏳");
    let dateMonth = (i%5)+1;
    let day = (i%28)+1;
    let dateStr = `2026-${String(dateMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>C${(i+1).toString().padStart(3,'0')}</td>
                    <td>${student}</td>
                    <td>${String.fromCharCode(65+(i%10))}${i%20+1}</td>
                    <td>${block}</td>
                    <td>${category}</td>
                    <td>Sample Issue ${i+1}</td>
                    <td class="status">${status}</td>
                    <td>${dateStr}</td>`;
    tableBody.appendChild(tr);
}

// Status badges
document.querySelectorAll('.status').forEach(el=>{
  if(el.innerText.includes('Pending')) el.classList.add('badge-pending');
  else if(el.innerText.includes('In Progress')) el.classList.add('badge-progress');
  else if(el.innerText.includes('Resolved')) el.classList.add('badge-resolved');
});

// Filter
function filterTable(){
  const input=document.getElementById('searchInput').value.toLowerCase();
  const status=document.getElementById('statusFilter').value;
  const trs=document.querySelectorAll("#complaintsTable tbody tr");
  trs.forEach(tr=>{
    let student=tr.cells[1].innerText.toLowerCase();
    let category=tr.cells[4].innerText.toLowerCase();
    let stat=tr.cells[6].innerText;
    tr.style.display=((student.includes(input)||category.includes(input))&&(!status||stat===status))?'':'none';
  });
}

// Export CSV
function exportCSV(){
  let csv="ID,Student,Room,Block,Category,Issue,Status,Date\n";
  const rows=document.querySelectorAll("#complaintsTable tbody tr");
  rows.forEach(r=>{
    if(r.style.display==='none') return;
    const cols=r.querySelectorAll('td');
    csv+=Array.from(cols).map(c=>c.innerText).join(",")+"\n";
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download="complaints.csv";a.click();URL.revokeObjectURL(url);
}

// Add Complaint Modal
function openAddComplaintModal(){
  const modal = new bootstrap.Modal(document.getElementById('addComplaintModal'));
  modal.show();
}
function submitAddComplaint(){
  const name = document.getElementById('newName').value;
  const room = document.getElementById('newRoom').value;
  const block = document.getElementById('newBlock').value;
  const category = document.getElementById('newCategory').value;
  if(!name||!room){alert("Please fill Name and Room"); return;}
  alert(`Complaint added:\nName: ${name}\nRoom: ${room}\nBlock: ${block}\nCategory: ${category}`);
  bootstrap.Modal.getInstance(document.getElementById('addComplaintModal')).hide();
}

// Search demo
function browseAnything(){
  const term = prompt("Search for student, room or category:");
  if(term) alert("You typed '"+term+"'");
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
