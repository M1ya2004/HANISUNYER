<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HostCare - Students</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#ffe6f0;font-family:Segoe UI, sans-serif;position:relative;}
body::before{content:"";position:absolute;width:600px;height:600px;background:radial-gradient(circle,#ffb6c1,#ff69b4,#ff1493);filter:blur(100px);border-radius:50%;animation:move1 12s infinite alternate;opacity:0.8;top:-100px;left:-150px;}
body::after{content:"";position:absolute;width:400px;height:400px;background:radial-gradient(circle,#ffc0cb,#ff69b4,#ff1493);filter:blur(80px);border-radius:50%;animation:move2 8s infinite alternate-reverse;opacity:0.7;bottom:-100px;right:-100px;}
@keyframes move1{from{transform:translate(-200px,-200px);}to{transform:translate(200px,200px);} }
@keyframes move2{from{transform:translate(150px,150px);}to{transform:translate(-150px,-150px);} }

.navbar{background:rgba(255,192,203,0.9);backdrop-filter:blur(5px);}
.navbar-buttons{margin-left:auto;display:flex;gap:10px;align-items:center;}
.btn-gradient{background:linear-gradient(90deg,#ff69b4,#ff1493);color:white;font-weight:bold;border-radius:8px;padding:6px 12px;border:none;transition:0.3s;cursor:pointer;font-size:0.9rem;}
.btn-gradient:hover{transform:scale(1.05);box-shadow:0 0 15px #ff1493;}
.sticky-bar{position:sticky;top:0;z-index:99;background:rgba(255,192,203,0.9);backdrop-filter:blur(5px);padding:10px;border-radius:10px;margin-bottom:10px;}
.table-hover tbody tr:hover{background:rgba(255,105,180,0.2);}
.footer-box{background: rgba(255,192,203,0.9);border-radius:10px;padding:10px 15px;text-align:center;margin:30px 10px 20px 10px;font-size:12px;color:#004d40;backdrop-filter: blur(5px);box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.table td:last-child{white-space:nowrap;padding:0.25rem 0.5rem;}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-4 sticky-top">
  <a class="navbar-brand fw-bold" href="dashboard.html">
    <img src="./logo.jpg" alt="HostCare Logo" style="height:40px;margin-right:10px;"> HostCare
  </a>
  <div class="navbar-buttons">
    <div class="dropdown">
      <button class="btn-gradient dropdown-toggle" type="button" data-bs-toggle="dropdown">Menu</button>
      <ul class="dropdown-menu dropdown-menu-end">
      <li><a class="dropdown-item" href="dashboard.html">Dashboard</a></li>
        <li><a class="dropdown-item" href="complaints.html">Complaints</a></li>
        <li><a class="dropdown-item" href="students.html">Students</a></li>
        <li><a class="dropdown-item" href="profile.html">Profile</a></li>
        <li><a class="dropdown-item" href="about.html">About</a></li>
      </ul>
    </div>
    <button class="btn-gradient" onclick="browseAnything()">🔍 Search</button>
    <button class="btn-gradient" data-bs-toggle="modal" data-bs-target="#notifModal">🔔 Notification</button>
    <button class="btn-gradient" onclick="location.href='index.html'">⏏️ Logout</button>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex gap-2 mb-3">
    <button class="btn btn-gradient" onclick="location.href='dashboard.html'">⬅ Back to Dashboard</button>
    <button class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#addStudentModal">➕ Add New Student</button>
  </div>

  <div class="sticky-bar d-flex gap-2 flex-wrap mt-3 mb-2">
    <input type="text" id="searchInput" class="form-control" placeholder="Search by student, room or block..." onkeyup="filterTable()" style="max-width:300px;">
    <select id="blockFilter" class="form-select" onchange="filterTable()" style="max-width:200px;">
      <option value="">All Blocks</option>
      <option value="Nova">Nova</option>
      <option value="Aurora">Aurora</option>
      <option value="Lumina">Lumina</option>
      <option value="Serene">Serene</option>
      <option value="Ibis">Ibis</option>
    </select>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-bordered" id="studentsTable">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Student Name</th>
          <th>Room</th>
          <th>Block</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="addStudentModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Add New Student</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label>Name:</label>
        <input type="text" id="newStudentName" class="form-control mb-2" placeholder="Student Name">
        <label>Room:</label>
        <input type="text" id="newStudentRoom" class="form-control mb-2" placeholder="Room">
        <label>Block:</label>
        <select id="newStudentBlock" class="form-select">
          <option value="Nova">Nova</option>
          <option value="Aurora">Aurora</option>
          <option value="Lumina">Lumina</option>
          <option value="Serene">Serene</option>
          <option value="Ibis">Ibis</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gradient" onclick="addNewStudent()">Submit</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="addComplaintModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>Add New Complaint</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label>Room:</label>
        <input type="text" id="complaintRoom" class="form-control mb-2" placeholder="Room">
        <label>Block:</label>
        <select id="complaintBlock" class="form-select mb-2">
          <option value="Nova">Nova</option>
          <option value="Aurora">Aurora</option>
          <option value="Lumina">Lumina</option>
          <option value="Serene">Serene</option>
          <option value="Ibis">Ibis</option>
        </select>
        <label>Category:</label>
        <select id="complaintCategory" class="form-select">
          <option value="Room 🛏️">Room 🛏️</option>
          <option value="Toilet 🚽">Toilet 🚽</option>
          <option value="Wifi 🌐">Wifi 🌐</option>
          <option value="Electrical ⚡">Electrical ⚡</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-gradient" onclick="submitComplaint()">Submit</button>
      </div>
    </div>
  </div>
</div>

<div class="footer-box">© 2026 HostCare System — Developed by Hanees</div>

<script>
// 450 students, 120 random with history
const firstNames=["Alya","Sara","Amira","Lina","Farah","Hana","Rania","Amal","Zara","Maya"];
const lastNames=["Aziz","Rahman","Hassan","Othman","Ismail","Mohd","Abdullah","Kamal","Ali","Yusof"];
const blocks=["Nova","Aurora","Lumina","Serene","Ibis"];
const tableBody=document.querySelector("#studentsTable tbody");

const students=[];
const historyIndices = Array.from({length:450},(_,i)=>i).sort(()=>Math.random()-0.5).slice(0,120);

// random complaints
function randomHistory(){const complaints=["Room fan broken","Toilet leak","Wifi not working","Electrical issue"]; const count=Math.floor(Math.random()*3)+1; let list=[]; for(let i=0;i<count;i++) list.push(complaints[Math.floor(Math.random()*complaints.length)]); return list;}

// generate students
for(let i=0;i<450;i++){
  const fname=firstNames[Math.floor(Math.random()*firstNames.length)];
  const lname=lastNames[Math.floor(Math.random()*lastNames.length)];
  const studentName=fname + " " + lname;
  const room=String.fromCharCode(65+(i%10))+((i%20)+1);
  const block=blocks[i%blocks.length];
  const hasHistory=historyIndices.includes(i);
  const history=hasHistory? randomHistory() : [];
  students.push({name:studentName, room, block, history});
}

// render table
students.forEach((s,i)=>{
  const tr=document.createElement("tr");
  tr.innerHTML=`<td>S${(i+1).toString().padStart(3,'0')}</td>
                <td>${s.name}</td>
                <td>${s.room}</td>
                <td>${s.block}</td>
                <td style="width:250px;">
                  <button class="btn btn-gradient btn-sm" onclick="alert('${s.history.length>0?s.history.join('\\n'):'No complaints yet.'}')">Check History</button>
                  <button class="btn btn-gradient btn-sm" data-bs-toggle="modal" data-bs-target="#addComplaintModal" onclick="setStudentName('${s.name}')">Add New Complaint</button>
                </td>`;
  tableBody.appendChild(tr);
});

let currentStudent="";
function setStudentName(student){currentStudent=student;}

function addNewStudent(){
  const name=document.getElementById('newStudentName').value;
  const room=document.getElementById('newStudentRoom').value;
  const block=document.getElementById('newStudentBlock').value;
  if(!name||!room){alert("Please fill all fields"); return;}
  const tr=document.createElement("tr");
  tr.innerHTML=`<td>S${(tableBody.rows.length+1).toString().padStart(3,'0')}</td>
                <td>${name}</td>
                <td>${room}</td>
                <td>${block}</td>
                <td style="width:250px;">
                  <button class="btn btn-gradient btn-sm" onclick="alert('No complaints yet.')">Check History</button>
                  <button class="btn btn-gradient btn-sm" data-bs-toggle="modal" data-bs-target="#addComplaintModal" onclick="setStudentName('${name}')">Add New Complaint</button>
                </td>`;
  tableBody.appendChild(tr);
  const modal=bootstrap.Modal.getInstance(document.getElementById('addStudentModal'));
  modal.hide();
  document.getElementById('newStudentName').value='';
  document.getElementById('newStudentRoom').value='';
}

function submitComplaint(){
  const room=document.getElementById('complaintRoom').value;
  const block=document.getElementById('complaintBlock').value;
  const category=document.getElementById('complaintCategory').value;
  if(!room){alert("Please fill all fields"); return;}
  alert(`Complaint added for ${currentStudent} - Room: ${room}, Block: ${block}, Category: ${category}`);
  const modal=bootstrap.Modal.getInstance(document.getElementById('addComplaintModal'));
  modal.hide();
  document.getElementById('complaintRoom').value='';
  document.getElementById('complaintCategory').value='Room 🛏️';
}

function browseAnything(){const term=prompt("Search for student, room or block:");if(term)alert("You typed '"+term+"'");}
function filterTable(){
  const input=document.getElementById('searchInput').value.toLowerCase();
  const block=document.getElementById('blockFilter').value.toLowerCase();
  document.querySelectorAll("#studentsTable tbody tr").forEach(tr=>{
    const name=tr.cells[1].innerText.toLowerCase();
    const blk=tr.cells[3].innerText.toLowerCase();
    tr.style.display=((name.includes(input) && (block=='' || blk.includes(block))) ? '' : 'none');
  });
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
