<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HostCare Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffe6f0; 
  overflow:hidden;
  position:relative;
}

body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, #ffb6c1, #ff69b4, #ff1493);
  filter:blur(80px);
  border-radius:50%;
  animation:move1 10s infinite alternate;
  opacity:0.8;
}

body::after{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle, #ffc0cb, #ff69b4, #ff1493);
  filter:blur(70px);
  border-radius:50%;
  animation:move2 6s infinite alternate-reverse;
  opacity:0.7;
}

@keyframes move1{
  from{transform:translate(-200px,-200px);}
  to{transform:translate(200px,200px);}
}
@keyframes move2{
  from{transform:translate(150px,150px);}
  to{transform:translate(-150px,-150px);}
}

.login-card{
  position:relative;
  width:400px;
  padding:30px;
  background:rgba(255,255,102,0.9);
  backdrop-filter:blur(10px);
  border-radius:15px;
  color:#004d40;
  box-shadow:0 5px 25px rgba(0,0,0,0.1);
  z-index:1;
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.header img{
  width:70px;
  height:70px;
  border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 10px rgba(0,150,136,0.3);
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}

.header h1{
  font-size:26px;
  margin-top:10px;
  color:#004d40;
}

.header p{
  font-size:13px;
  color:#00796b;
  margin-top:5px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #26a69a;
  outline:none;
  border-radius:8px;
  background:#ffffff;
  color:#004d40;
  transition:0.3s;
}

input::placeholder{
  color:#80cbc4;
}

input:focus{
  border-color:#00897b;
  box-shadow:0 0 8px #26a69a50;
}

.demo-box{
  margin-top:12px;
  padding:12px;
  border-radius:10px;
  background:rgba(255,255,102,0.8);
  border:1px solid #ffeb3b;
}

.demo-title{
  font-size:12px;
  color:#004d40;
  font-weight:bold;
  margin-bottom:10px;
  letter-spacing:0.5px;
}

.demo-row{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid #ffeb3b;
}

.demo-row:last-child{
  border-bottom:none;
}

.demo-label{
  font-size:12px;
  color:#004d40;
}

.demo-value{
  font-size:12px;
  color:#004d40;
  font-weight:500;
  letter-spacing:1px;
}

.row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:8px;
}

.row a{
  color:#00897b;
  text-decoration:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#ff69b4,#ff1493);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px #ff149370;
}

.bottom{
  text-align:center;
  margin-top:15px;
  font-size:12px;
  color:#004d40;
}

.bottom a{
  color:#00897b;
}

.footer{
  text-align:center;
  margin-top:15px;
  font-size:11px;
  color:#004d40;
}

.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
  z-index:2;
}

.modal-content{
  background:rgba(255,255,153,0.95);
  padding:20px;
  border-radius:10px;
  width:300px;
  color:#004d40;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.close{
  float:right;
  cursor:pointer;
  color:#00796b;
}

@media(max-width:480px){
  .login-card{
    width:90%;
    padding:20px;
  }
}
</style>
</head>
<body>

<div class="login-card">
  <div class="header">
    <!-- Corrected path to images folder -->
    <img src="./images/logo.jpg" alt="HostCare Logo">
    <h1>Welcome to HostCare</h1>
    <p>Your Safety is Our Priority</p>
  </div>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <div class="demo-box">
    <div class="demo-title">🔑 Demo Credentials</div>

    <div class="demo-row">
      <div class="demo-label">Username</div>
      <div class="demo-value">admin</div>
    </div>

    <div class="demo-row">
      <div class="demo-label">Password</div>
      <div class="demo-value">1234</div>
    </div>
  </div>

  <div class="row">
    <label for="remember">
      <input type="checkbox" id="remember" style="width:auto;"> Remember me
    </label>

    <a href="#" onclick="openForgot()">Forgot password ?</a>
  </div>

  <button onclick="login()">Login</button>

  <div class="bottom">
    No account? <a href="#" onclick="openSignup()">Sign up</a>
  </div>

  <div class="footer">
    © 2026 HostCare. All Rights Reserved.
  </div>
</div>

<div class="modal" id="forgotModal">
  <div class="modal-content">
    <span class="close" onclick="closeForgot()">X</span>
    <h3>Reset Password</h3>
    <input type="email" id="resetEmail" placeholder="Enter email">
    <button onclick="sendReset()">Send Reset Link</button>
  </div>
</div>

<div class="modal" id="signupModal">
  <div class="modal-content">
    <span class="close" onclick="closeSignup()">X</span>
    <h3>Sign Up</h3>
    <input type="text" id="newUsername" placeholder="Username">
    <input type="email" id="newEmail" placeholder="Email">
    <input type="password" id="newPassword" placeholder="Password">
    <button onclick="createAccount()">Create Account</button>
  </div>
</div>

<script>
function login(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  if(username === "admin" && password === "1234"){
    alert("Login successful!");
    window.location.href = "dashboard.html";
  } else {
    alert("Incorrect username or password!");
  }
}

function openForgot(){ document.getElementById("forgotModal").style.display="flex"; }
function closeForgot(){ document.getElementById("forgotModal").style.display="none"; }
function openSignup(){ document.getElementById("signupModal").style.display="flex"; }
function closeSignup(){ document.getElementById("signupModal").style.display="none"; }

function sendReset(){
  const email = document.getElementById("resetEmail").value;
  if(email){ alert(`Reset link sent to ${email}`); closeForgot(); }
  else{ alert("Please enter your email!"); }
}

function createAccount(){
  const username = document.getElementById("newUsername").value;
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPassword").value;
  if(username && email && password){ alert(`Account ${username} created!`); closeSignup(); }
  else{ alert("Please fill all fields!"); }
}

document.addEventListener('keydown',(e)=>{ if(e.key==="Escape"){ closeForgot(); closeSignup(); } });
</script>

</body>
</html>
